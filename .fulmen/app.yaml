# Application identity for @fulmenhq/tsfulmen.
#
# tsfulmen is primarily an SDK/library, but it also ships developer CLIs as
# package bins (tsfulmen-schema, tsfulmen-signals, tsfulmen-prometheus). The
# app-identity schema's `binary_name` is singular, so it carries the package's
# canonical slug; the individual bins are enumerated under the formal
# `metadata.typescript` section (Crucible app-identity v0.4.14+, the npm analogue
# of `metadata.python`).
app:
  binary_name: tsfulmen
  vendor: fulmenhq
  env_prefix: TSFULMEN_
  config_name: tsfulmen
  description: TypeScript Fulmen SDK — Crucible SSOT access and core utilities
metadata:
  project_url: https://github.com/fulmenhq/tsfulmen
  license: MIT
  repository_category: sdk
  telemetry_namespace: tsfulmen
  typescript:
    package_name: "@fulmenhq/tsfulmen"
    console_scripts:
      - name: tsfulmen-schema
        entry_point: ./dist/bin/schema-cli.js
      - name: tsfulmen-signals
        entry_point: ./dist/bin/signals-cli.js
      - name: tsfulmen-prometheus
        entry_point: ./dist/bin/prometheus-cli.js
