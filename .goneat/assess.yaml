# goneat Assess Configuration
# See: goneat docs show assess/lint-shell-make-gha
version: 1
lint:
  shell:
    # Only match shell scripts - scripts/ contains TypeScript files
    paths: ["**/*.sh"]
    ignore: []
    shfmt:
      enabled: true
      fix: false
    shellcheck:
      enabled: false
  github_actions:
    actionlint:
      enabled: true
      paths: [".github/workflows/**/*.yml", ".github/workflows/**/*.yaml"]
      ignore: []
  make:
    checkmake:
      enabled: true
      config:
        # Increased from default 5 - FulmenHQ Makefiles have comprehensive
        # instrumented targets with step-by-step output for developer experience.
        # Bootstrap target is particularly verbose due to inline sfetch trust
        # anchor pattern (avoiding separate script for consistency with rsfulmen).
        max_body_length: 60
        min_phony_targets: ["all", "clean", "test", "help"]
    paths: ["**/Makefile"]
    ignore: []
# Format configuration. Without this block goneat's format category falls back to
# whitespace/EOF normalization only and never scopes Markdown/JSON/YAML — so the
# format leg of the pre-commit/pre-push hooks (.goneat/hooks.yaml) and
# `goneat assess --categories format` silently skip Markdown (this let trailing-
# whitespace drift ship through every gate). Mirrors the goneat-ecosystem reference
# (sumpter). Ignores cover SSOT-synced trees (config|schemas|docs/crucible-ts —
# owned by Crucible, must not be reformatted locally), generated + build output,
# and vendored/scratch dirs. TypeScript/JS formatting is owned by Biome, not goneat.
format:
  eof:
    enabled: true
    enforce_single_newline: true
  trailing_whitespace:
    enabled: true
  markdown:
    enabled: true
    paths:
      - "**/*.md"
    ignore:
      - "**/config/crucible-ts/**"
      - "**/schemas/crucible-ts/**"
      - "**/docs/crucible-ts/**"
      - "**/src/assets/generated/**"
      - "**/dist/**"
      - "**/coverage/**"
      - "**/node_modules/**"
      - ".plans/**"
      - ".scratchpad/**"
      - ".cache/**"
  json:
    enabled: true
    paths:
      - "**/*.json"
    ignore:
      - "**/config/crucible-ts/**"
      - "**/schemas/crucible-ts/**"
      - "**/docs/crucible-ts/**"
      - "**/src/assets/generated/**"
      - "**/dist/**"
      - "**/coverage/**"
      - "**/node_modules/**"
      - ".plans/**"
      - ".scratchpad/**"
      - ".cache/**"
  yaml:
    enabled: true
    paths:
      - "**/*.yaml"
      - "**/*.yml"
    ignore:
      - "**/config/crucible-ts/**"
      - "**/schemas/crucible-ts/**"
      - "**/docs/crucible-ts/**"
      - "**/src/assets/generated/**"
      - "**/dist/**"
      - "**/coverage/**"
      - "**/node_modules/**"
      - ".plans/**"
      - ".scratchpad/**"
      - ".cache/**"
