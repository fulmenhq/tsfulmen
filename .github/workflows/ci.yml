name: CI
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  BUN_VERSION: "1.3.9"  # keep in sync with the version we use locally
  # Single pin for the goneat toolchain: feeds both the cache key below and
  # `make bootstrap` (Make's ?= respects this env value over the Makefile default).
  GONEAT_VERSION: "v0.5.13"
jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # yamllint disable-line rule:line-length
        os: [ubuntu-latest, macos-latest]  # add windows-latest later if needed
    steps:
      - uses: actions/checkout@v5
      # Bun signature verification requires minisign
      - name: Install minisign (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Install minisign (macOS)
        if: runner.os == 'macOS'
        run: brew install minisign
      # Bun toolchain ---------------------------------------------------------
      - name: Set up Bun ${{ env.BUN_VERSION }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Cache goneat in ~/.local/bin between runs
      - name: Cache toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/bin
          # yamllint disable-line rule:line-length
          key: ${{ runner.os }}-toolchain-goneat-${{ env.GONEAT_VERSION }}
          restore-keys: |
            ${{ runner.os }}-toolchain-goneat-
      # Dependencies + external tools -----------------------------------------
      - name: Bootstrap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make bootstrap
      # Build artifacts needed for tests --------------------------------------
      - name: Build package
        run: make build
      # CI gates ---------------------------------------------------------------
      - name: Run check-all
        run: make check-all  # lint + typecheck + vitest
        # TODO: Add coverage when version compatibility resolved
        # - name: Upload coverage to Codecov
        #   if: matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != ''
        #   uses: codecov/codecov-action@v4
        #   with:
        #     files: coverage/coverage-final.json
        #     fail_ci_if_error: false
  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      # Bun signature verification requires minisign
      - name: Install minisign (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y minisign
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Bootstrap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make bootstrap
      - name: Build package
        run: make build
      # Regression guard for the bun build --compile blockers fixed in v0.3.1
      # (CLI shadowing + string-metrics WASM ENOENT). Packs the tarball, installs
      # it into an isolated consumer, compiles a fixture, and asserts the consumer
      # owns its CLI and WASM loads. See scripts/verify-compile-smoke.ts.
      - name: Compiled-binary smoke test
        run: bunx tsx scripts/verify-compile-smoke.ts
      - name: Upload dist
        uses: actions/upload-artifact@v5
        with:
          name: tsfulmen-dist
          path: dist/
